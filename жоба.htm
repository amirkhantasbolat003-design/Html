<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Мұғалімнің жеке шеберханасы</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(120deg, #00f2fe, #4facfe);
  color: white;
  padding: 40px;
  transition: 0.3s;
}
body.dark {
  background: #0f172a;
  color: #e5e7eb;
}
h1 {
  text-align: center;
}
a {
  display: block;
  margin: 10px 0;
  padding: 15px;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 10px;
  text-decoration: none;
  color: white;
  font-size: 18px;
  transition: 0.3s;
}
a:hover {
  background: rgba(0, 0, 0, 0.5);
}
button {
  position: fixed;
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  color: white;
  cursor: pointer;
  z-index: 999;
}
#darkBtn {
  top: 20px;
  right: 20px;
  background: black;
}
.top-section {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin: 40px 0;
  gap: 20px;
  flex-wrap: wrap;
}
.image-box {
  width: 45%;
  text-align: center;
}
.image-box img {
  width: 100%;
  max-width: 350px;
  height: auto;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
}
.quote {
  margin-top: 15px;
  font-style: italic;
  font-size: 16px;
}
@media (max-width: 768px) {
  .top-section {
    flex-direction: column;
    align-items: center;
  }
  .image-box {
    width: 100%;
  }
}
</style>
</head>
<body>

<button id="darkBtn" onclick="toggleDark()">🌙 Dark</button>

<h1>Мұғалімнің жеке шеберханасы</h1>

<div class="top-section">
  <div class="image-box">
    <img src="1.jpg" alt="Мұғалім">
    <div class="quote">"Білім – қуат, ал еңбек – бұл білімнің дәні."</div>
  </div>

  <div class="image-box">
    <div class="quote">
      "Оқыту – бұл тек ақпаратты беру ғана емес, сонымен қатар, оны игеруге үйрету."
    </div>
  </div>
</div>

<h2>Сабақ процесі</h2>
<p>Сабақ барысында ЖИ арқылы істелінген видеолар:</p>
<a href="video1.mp4">Видеолар 1</a>
<a href="video2.mp4">Видеолар 2</a>

<h2>Ойындар</h2>
<a href="game1.html">Ойын 1</a>
<a href="game2.html">Ойын 2</a>

<h2>Презентация</h2>
<a href="presentation.pptx">Презентация</a>

<script>
let dark = false;
function toggleDark() {
  document.body.classList.toggle("dark");
  dark = !dark;
  document.getElementById("darkBtn").innerText = dark ? "☀ Light" : "🌙 Dark";
}
</script>

</body>
</html>
